<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanças Hub - Gestão Completa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }
  </style>
</head>

<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-8">
    
    <header class="flex flex-col items-center justify-center mb-10 gap-6 border-b border-gray-800 pb-8 text-center">
      <div class="flex flex-col items-center gap-3">
        <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-600/20">
          <i data-lucide="wallet" class="w-8 h-8 text-white"></i>
        </div>
        <div>
          <h1 class="text-3xl font-black tracking-tight">Finanças<span class="text-indigo-500">Hub</span></h1>
          <p class="text-sm text-gray-400">Controle total: Banco, Débito, Dinheiro, Crédito e Invest.</p>
        </div>
      </div>
      <div class="bg-gray-800/50 p-4 rounded-2xl border border-gray-700/50 w-full max-w-sm">
        <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">Saldo Líquido Disponível</p>
        <h2 id="balance" class="text-4xl font-black text-white mt-1">R$ 0,00</h2>
      </div>
    </header>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1">
        <div class="bg-gray-800/40 border border-gray-800 rounded-2xl p-6">
          <h3 class="text-sm font-semibold mb-4 text-gray-400 uppercase">Nova Transação</h3>
          <form id="transaction-form" class="space-y-4">
            <input type="date" id="date" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none">
            <select id="account" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none">
              <option value="bank">Conta Bancária</option>
              <option value="debit">Cartão de Débito</option>
              <option value="cash">Dinheiro em Espécie</option>
              <option value="credit">Cartão de Crédito</option>
              <option value="investment">Investimento</option>
            </select>
            <input type="text" id="desc" required placeholder="Descrição" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none">
            <input type="number" step="0.01" id="amount" required placeholder="Valor R$" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 outline-none">
            <div class="grid grid-cols-2 gap-3">
              <label class="flex items-center justify-center border border-gray-700 rounded-xl p-3 cursor-pointer has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-500/10 transition-all"><input type="radio" name="type" value="income" checked class="sr-only"> Entrada</label>
              <label class="flex items-center justify-center border border-gray-700 rounded-xl p-3 cursor-pointer has-[:checked]:border-rose-500 has-[:checked]:bg-rose-500/10 transition-all"><input type="radio" name="type" value="expense" class="sr-only"> Saída</label>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl text-sm font-bold transition-colors">Adicionar Transação</button>
          </form>
        </div>
      </div>
      
      <div class="lg:col-span-2 space-y-6">
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="bg-gray-800/40 border border-gray-800 p-4 rounded-2xl text-center"><span class="text-[10px] text-gray-400">ENTRADAS</span><h3 id="total-income" class="text-lg font-bold text-emerald-400">R$ 0,00</h3></div>
          <div class="bg-gray-800/40 border border-gray-800 p-4 rounded-2xl text-center"><span class="text-[10px] text-gray-400">SAÍDAS</span><h3 id="total-expense" class="text-lg font-bold text-rose-400">R$ 0,00</h3></div>
          <div class="bg-gray-800/40 border border-gray-800 p-4 rounded-2xl text-center"><span class="text-[10px] text-gray-400">CRÉDITO</span><h3 id="total-credit" class="text-lg font-bold text-orange-400">R$ 0,00</h3></div>
          <div class="bg-gray-800/40 border border-gray-800 p-4 rounded-2xl text-center"><span class="text-[10px] text-gray-400">INVEST.</span><h3 id="total-investment" class="text-lg font-bold text-blue-400">R$ 0,00</h3></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-gray-800/40 border border-gray-800 p-6 rounded-2xl"><h3 class="text-sm font-semibold text-gray-400 mb-4 uppercase text-center">Mês</h3><canvas id="monthlyChart"></canvas></div>
          <div class="bg-gray-800/40 border border-gray-800 p-6 rounded-2xl"><h3 class="text-sm font-semibold text-gray-400 mb-4 uppercase text-center">Tendência Anual</h3><canvas id="yearlyChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    lucide.createIcons();
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    let currentDate = new Date();
    let charts = { monthly: null, yearly: null };

    const formatCurrency = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    const updateCharts = () => {
        const year = currentDate.getFullYear();
        const currentMonth = `${year}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
        const mData = transactions.filter(t => t.date.startsWith(currentMonth));
        const activeAccounts = ['bank', 'debit', 'cash'];
        
        const mInc = mData.filter(t => t.type === 'income' && activeAccounts.includes(t.account)).reduce((a, b) => a + b.amount, 0);
        const mExp = mData.filter(t => t.type === 'expense' && activeAccounts.includes(t.account)).reduce((a, b) => a + b.amount, 0);

        if (charts.monthly) charts.monthly.destroy();
        charts.monthly = new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: { labels: ['Entrada', 'Saída'], datasets: [{ data: [mInc, mExp], backgroundColor: ['#10b981', '#f43f5e'] }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        const yData = transactions.filter(t => new Date(t.date).getFullYear() === year);
        const yearlyTotals = Array.from({ length: 12 }, (_, i) => {
            const m = String(i + 1).padStart(2, '0');
            return yData.filter(t => t.date.includes(`-${m}-`)).reduce((a, b) => a + (b.type === 'income' ? b.amount : -b.amount), 0);
        });

        if (charts.yearly) charts.yearly.destroy();
        charts.yearly = new Chart(document.getElementById('yearlyChart'), {
            type: 'line',
            data: { labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'], datasets: [{ data: yearlyTotals, borderColor: '#6366f1', fill: true, tension: 0.4 }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    };

    const render = () => {
      const target = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
      const filtered = transactions.filter(t => t.date.startsWith(target));
      const activeAccounts = ['bank', 'debit', 'cash'];
      
      const bIn = filtered.filter(t => t.type === 'income' && activeAccounts.includes(t.account)).reduce((a, b) => a + b.amount, 0);
      const bEx = filtered.filter(t => t.type === 'expense' && activeAccounts.includes(t.account)).reduce((a, b) => a + b.amount, 0);
      
      document.getElementById('total-income').innerText = formatCurrency(bIn);
      document.getElementById('total-expense').innerText = formatCurrency(bEx);
      document.getElementById('total-credit').innerText = formatCurrency(filtered.filter(t => t.account === 'credit').reduce((a, b) => a + b.amount, 0));
      document.getElementById('total-investment').innerText = formatCurrency(filtered.filter(t => t.account === 'investment').reduce((a, b) => a + b.amount, 0));
      document.getElementById('balance').innerText = formatCurrency(bIn - bEx);
      updateCharts();
    };

    document.getElementById('transaction-form').addEventListener('submit', (e) => {
      e.preventDefault();
      transactions.unshift({ 
        date: document.getElementById('date').value, 
        account: document.getElementById('account').value, 
        description: document.getElementById('desc').value, 
        amount: parseFloat(document.getElementById('amount').value), 
        type: document.querySelector('input[name="type"]:checked').value 
      });
      localStorage.setItem('transactions', JSON.stringify(transactions));
      render();
    });

    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    render();
  </script>
</body>
</html>
